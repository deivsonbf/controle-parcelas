server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 404;
}

server {
    listen 80;
    listen [::]:80;
    server_name deivsoft.dev.br www.deivsoft.dev.br;
    return 301 https://deivsoft.dev.br$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name deivsoft.dev.br www.deivsoft.dev.br;

    ssl_certificate /etc/letsencrypt/live/deivsoft.dev.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deivsoft.dev.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/deivsoft-personal;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
