version: "2.4"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    command: sh -c "node apps/api/dist/db/migrate.js && node apps/api/dist/db/seed.js && npm run start -w @card-manager/api"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_PIX_KEY: ${VITE_PIX_KEY}
        VITE_PIX_RECEIVER_NAME: ${VITE_PIX_RECEIVER_NAME}
        VITE_PIX_RECEIVER_CITY: ${VITE_PIX_RECEIVER_CITY}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:5173:80"

volumes:
  postgres_data:
